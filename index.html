<!DOCTYPE html>
<html>
<head>
  <title>Certificate Generator</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h2>Get Your Certificate</h2>

<input type="text" id="name" placeholder="Enter your name" />
<br><br>
<button onclick="generate()">Download Certificate</button>

<p id="msg"></p>

<canvas id="canvas" width="800" height="600" style="display:none;"></canvas>

<script>
  // ? EXPIRY DATE (change this)
  const expiry = new Date("2026-04-30T23:59:59");
  const now = new Date();

  if (now > expiry) {
    document.body.innerHTML = "<h2>? Link Expired</h2>";
  }

  function generate() {
    const name = document.getElementById("name").value;
    if (!name) {
      alert("Enter your name");
      return;
    }

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Background
    ctx.fillStyle = "#fdf6e3";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Title
    ctx.fillStyle = "#000";
    ctx.font = "30px Arial";
    ctx.fillText("Certificate of Completion", 200, 100);

    // Name
    ctx.font = "40px Arial";
    ctx.fillText(name, 300, 300);

    // Download
    const link = document.createElement("a");
    link.download = "certificate.png";
    link.href = canvas.toDataURL();
    link.click();
  }
</script>

</body>
</html>
